<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Switcher</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div id="step-lang">
    <h3>Выберите язык</h3>
    <div class="grid">
      <div class="btn lang-select" data-lang="en">
        <div class="icon">🇬🇧</div>
        <div class="label">English</div>
      </div>
      <div class="btn lang-select" data-lang="fr">
        <div class="icon">🇫🇷</div>
        <div class="label">Français</div>
      </div>
    </div>
  </div>

  <div id="step-profile" class="hidden">
    <h3>
      Профиль
      <button id="back-btn" class="back-btn">← Назад</button>
    </h3>
    <div class="grid" id="profile-container"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
